name: CD — SSH deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy via SSH
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'master')
    runs-on: ubuntu-latest
    # Required for Environment secrets: name must match Settings → Environments → <name>
    environment: prod
    steps:
      - name: Debug — print variables
        env:
          _DEBUG_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          echo "=== github context ==="
          echo "github.event_name=${{ github.event_name }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.sha=${{ github.sha }}"
          echo "github.repository=${{ github.repository }}"
          echo "github.actor=${{ github.actor }}"
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "github.event.workflow_run.conclusion=${{ github.event.workflow_run.conclusion }}"
            echo "github.event.workflow_run.head_branch=${{ github.event.workflow_run.head_branch }}"
            echo "github.event.workflow_run.name=${{ github.event.workflow_run.name }}"
            echo "github.event.workflow_run.html_url=${{ github.event.workflow_run.html_url }}"
          fi
          echo ""
          echo "=== appleboy/ssh-action with.* (GitHub masks secret values in logs) ==="
          echo "DEPLOY_SSH_HOST=${{ secrets.DEPLOY_SSH_HOST }}"
          echo "DEPLOY_SSH_USER=${{ secrets.DEPLOY_SSH_USER }}"
          echo "DEPLOY_SSH_PORT=${{ secrets.DEPLOY_SSH_PORT }}"
          echo "DEPLOY_SSH_KEY_char_count=${#_DEBUG_SSH_KEY}"
          echo ""
          echo "=== env passed to remote script (same masking applies) ==="
          echo "DEPLOY_DOMAIN=${{ secrets.DEPLOY_DOMAIN }}"
          echo "DEPLOY_PUBLIC_HOST=${{ secrets.DEPLOY_PUBLIC_HOST }}"
          echo "REPO_SSH=${{ secrets.REPO_SSH }}"
          echo "PROJECT_DIR=${{ secrets.PROJECT_DIR }}"
          echo "GIT_BRANCH=${{ secrets.GIT_BRANCH }}"
          echo "CLIENT_ID=${{ secrets.CLIENT_ID }}"
          echo "CLIENT_SECRET=${{ secrets.CLIENT_SECRET }}"
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}"
          echo "SESSION_SECRET=${{ secrets.SESSION_SECRET }}"
          echo "ENABLE_HTTPS=${{ secrets.ENABLE_HTTPS }}"
          echo "EMAIL_FOR_LETSENCRYPT=${{ secrets.EMAIL_FOR_LETSENCRYPT }}"
          echo "SSL_CERTIFICATE_PATH=${{ secrets.SSL_CERTIFICATE_PATH }}"
          echo "SSL_PRIVATE_KEY_PATH=${{ secrets.SSL_PRIVATE_KEY_PATH }}"
          echo "NODE_MAJOR=${{ secrets.NODE_MAJOR }}"
          echo "BACKEND_PORT=${{ secrets.BACKEND_PORT }}"

      - name: Run remote deploy script
        uses: appleboy/ssh-action@v1.2.0
        env:
          DEPLOY_DOMAIN: ${{ secrets.DEPLOY_DOMAIN }}
          DEPLOY_PUBLIC_HOST: ${{ secrets.DEPLOY_PUBLIC_HOST }}
          REPO_SSH: ${{ secrets.REPO_SSH }}
          PROJECT_DIR: ${{ secrets.PROJECT_DIR }}
          GIT_BRANCH: ${{ secrets.GIT_BRANCH }}
          CLIENT_ID: ${{ secrets.CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CLIENT_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          ENABLE_HTTPS: ${{ secrets.ENABLE_HTTPS }}
          EMAIL_FOR_LETSENCRYPT: ${{ secrets.EMAIL_FOR_LETSENCRYPT }}
          SSL_CERTIFICATE_PATH: ${{ secrets.SSL_CERTIFICATE_PATH }}
          SSL_PRIVATE_KEY_PATH: ${{ secrets.SSL_PRIVATE_KEY_PATH }}
          NODE_MAJOR: ${{ secrets.NODE_MAJOR }}
          BACKEND_PORT: ${{ secrets.BACKEND_PORT }}
        with:
          host: ${{ secrets.DEPLOY_SSH_HOST }}
          username: ${{ secrets.DEPLOY_SSH_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          envs: DEPLOY_DOMAIN,DEPLOY_PUBLIC_HOST,REPO_SSH,PROJECT_DIR,GIT_BRANCH,CLIENT_ID,CLIENT_SECRET,JWT_SECRET,SESSION_SECRET,ENABLE_HTTPS,EMAIL_FOR_LETSENCRYPT,SSL_CERTIFICATE_PATH,SSL_PRIVATE_KEY_PATH,NODE_MAJOR,BACKEND_PORT
          script_stop: true
          command_timeout: 60m
          script: |
            set -euo pipefail

            PROJECT_DIR="${PROJECT_DIR:-/var/www/ai-project}"
            DEPLOY_DOMAIN="${DEPLOY_DOMAIN:-example.com}"
            REPO_SSH="${REPO_SSH:-}"
            GIT_BRANCH="${GIT_BRANCH:-master}"
            ENABLE_HTTPS="${ENABLE_HTTPS:-true}"
            SSL_CERTIFICATE_PATH="${SSL_CERTIFICATE_PATH:-}"
            SSL_PRIVATE_KEY_PATH="${SSL_PRIVATE_KEY_PATH:-}"
            NODE_MAJOR="${NODE_MAJOR:-20}"
            BACKEND_PORT="${BACKEND_PORT:-3000}"

            echo "=== remote: values after defaults (secrets not echoed — avoid leaking into Actions log) ==="
            echo "PROJECT_DIR=$PROJECT_DIR"
            echo "DEPLOY_DOMAIN=$DEPLOY_DOMAIN"
            echo "GIT_BRANCH=$GIT_BRANCH"
            echo "ENABLE_HTTPS=$ENABLE_HTTPS"
            echo "NODE_MAJOR=$NODE_MAJOR"
            echo "BACKEND_PORT=$BACKEND_PORT"
            dbg_len_or_empty() { n="$1"; v="$2"; if [ -n "$v" ]; then echo "$n=len=${#v}"; else echo "$n=[empty]"; fi; }
            dbg_len_or_empty REPO_SSH "$REPO_SSH"
            dbg_len_or_empty CLIENT_ID "$CLIENT_ID"
            dbg_len_or_empty CLIENT_SECRET "$CLIENT_SECRET"
            dbg_len_or_empty JWT_SECRET "$JWT_SECRET"
            dbg_len_or_empty SESSION_SECRET "$SESSION_SECRET"
            dbg_len_or_empty EMAIL_FOR_LETSENCRYPT "$EMAIL_FOR_LETSENCRYPT"
            dbg_len_or_empty SSL_CERTIFICATE_PATH "$SSL_CERTIFICATE_PATH"
            dbg_len_or_empty SSL_PRIVATE_KEY_PATH "$SSL_PRIVATE_KEY_PATH"

            mkdir -p "$PROJECT_DIR"
            cd "$PROJECT_DIR"

            if [ ! -d .git ]; then
              if [ -z "$REPO_SSH" ]; then
                echo "首次部署需要配置 Secret：REPO_SSH（仓库 SSH 地址）" >&2
                exit 1
              fi
              git clone "$REPO_SSH" .
            fi

            git fetch --all
            git checkout "$GIT_BRANCH"
            git pull origin "$GIT_BRANCH"

            bash ./deploy/deploy-remote.sh
